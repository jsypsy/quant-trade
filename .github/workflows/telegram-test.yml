name: 텔레그램 테스트

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Create .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printf '%s' "$DOT_ENV" > .env

      - name: 텔레그램 테스트 발송
        run: |
          TOKEN=$(grep '^TELEGRAM_BOT_TOKEN=' .env | cut -d'=' -f2-)
          CHAT_ID=$(grep '^TELEGRAM_CHAT_ID=' .env | cut -d'=' -f2-)
          echo "TOKEN 길이: ${#TOKEN} (0이면 파싱 실패)"
          echo "CHAT_ID: $CHAT_ID"
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"GitHub Actions 텔레그램 테스트 성공\"}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' && echo "전송 성공" || echo "전송 실패"
