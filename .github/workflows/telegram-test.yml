name: 텔레그램 테스트

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printf '%s' "$DOT_ENV" > .env

      - name: .env 진단
        run: |
          echo "줄 수: $(wc -l < .env)"
          echo "TELEGRAM 줄 목록 (앞 10자만):"
          grep 'TELEGRAM' .env | sed 's/=\(.\{0,10\}\).*/=\1.../'

      - name: 텔레그램 테스트 발송
        run: uv run python scripts/test_telegram.py
