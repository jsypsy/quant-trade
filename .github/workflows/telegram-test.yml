name: 텔레그램 테스트

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printf '%s' "$DOT_ENV" > .env

      - name: 텔레그램 테스트 발송
        run: uv run python scripts/test_telegram.py
