name: 포트폴리오 현황

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
        run: printf '%s' "$DOT_ENV" > .env

      - name: Create KIS config
        env:
          KIS_CONFIG: ${{ secrets.KIS_CONFIG_YAML }}
        run: |
          mkdir -p ~/KIS/config
          printf '%s' "$KIS_CONFIG" > ~/KIS/config/kis_devlp.yaml

      - name: 포트폴리오 조회
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scripts/portfolio_report.py
