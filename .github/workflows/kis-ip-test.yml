name: KIS API IP Test

on:
  workflow_dispatch:
    inputs:
      kis_env:
        description: 'KIS 환경 (vps=모의, prod=실전). 주문 없이 연결만 검증.'
        default: 'vps'
        required: false
        type: choice
        options:
          - vps
          - prod

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create .env
        run: |
          cat > .env <<EOF
          KIS_ENV=${{ inputs.kis_env || 'vps' }}
          DRY_RUN=true
          EOF

      - name: Create KIS config
        env:
          KIS_CONFIG: ${{ secrets.KIS_CONFIG_YAML }}
        run: |
          mkdir -p ~/KIS/config
          printf '%s' "$KIS_CONFIG" > ~/KIS/config/kis_devlp.yaml

      - name: Test — 토큰 발급 + 잔고 조회
        run: |
          uv run python - <<'PYEOF'
          import sys
          sys.path.insert(0, ".")
          from src.kis.auth import KISAuth
          from src.kis.client import KISClient
          from src.portfolio.account import AccountQuery

          print("1. KIS 토큰 발급...")
          auth = KISAuth()
          token = auth.get_access_token()
          print(f"   OK: {token[:20]}...")

          print("2. 잔고 조회...")
          client = KISClient(auth)
          account = AccountQuery(client)
          balance = account.get_balance()
          print(f"   OK: 예수금={balance.cash:,}원  총평가={balance.portfolio_value:,}원")

          print("\nKIS API 연결 성공 — GitHub Actions IP 차단 없음")
          PYEOF
