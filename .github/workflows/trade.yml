name: 자동매매

on:
  workflow_dispatch:
  schedule:
    # 평일 09:00 KST = 00:00 UTC (월~금). GitHub 스케줄러 사정으로 수 분~수 시간 지연될 수 있음.
    - cron: "0 0 * * 1-5"

# 동시 실행 차단 — 봇 두 대가 같은 계좌에서 동시 매매하는 것 방지.
# cancel-in-progress: false → 이미 도는 실행을 취소하지 않고 새 실행을 대기시킨다.
# (수동 9시 실행이 늦게 뜨는 cron에 중간에 취소·재시작되면 손절 카운터 등 인메모리
#  상태가 리셋되어 churn 필터가 반쪽만 작동하던 문제 방지 — 하루 단일 실행 보장.)
concurrency:
  group: 자동매매
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 420  # 장 최대 6.5시간 + 여유

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
          TELEGRAM_CONFIG: ${{ secrets.TELEGRAM_CONFIG }}
        run: |
          # DOT_ENV(설정) + TELEGRAM_CONFIG(토큰·챗ID 한 시크릿) 병합. 줄바꿈으로 분리.
          printf '%s\n' "$DOT_ENV" > .env
          printf '%s\n' "$TELEGRAM_CONFIG" >> .env

      - name: Create KIS config
        env:
          KIS_CONFIG: ${{ secrets.KIS_CONFIG_YAML }}
        run: |
          mkdir -p ~/KIS/config
          printf '%s' "$KIS_CONFIG" > ~/KIS/config/kis_devlp.yaml

      - name: 장마감까지 남은 시간 계산
        id: calc
        run: |
          # 마감 시각 = 거래소별. prod + NXT/SOR → 20:00(애프터마켓), 그 외 → 15:30(KRX 정규장).
          EXCH=$(grep -E '^KR_EXCHANGE=' .env | cut -d= -f2 | tr -d '[:space:]' | tr a-z A-Z)
          ENV=$(grep -E '^KIS_ENV=' .env | cut -d= -f2 | tr -d '[:space:]')
          if [ "$ENV" = "prod" ] && { [ "$EXCH" = "SOR" ] || [ "$EXCH" = "NXT" ]; }; then
            CLOSE_HM="20:00:00"
          else
            CLOSE_HM="15:30:00"
          fi
          echo "마감 시각: $CLOSE_HM (KIS_ENV=$ENV, KR_EXCHANGE=${EXCH:-KRX})"
          CLOSE=$(TZ=Asia/Seoul date -d "today $CLOSE_HM" +%s)
          NOW=$(date +%s)
          REMAINING=$(( (CLOSE - NOW) / 60 ))
          if [ "$REMAINING" -le 0 ]; then
            echo "장 마감 후 — 실행 건너뜀"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "남은 시간: ${REMAINING}분"
            echo "minutes=$REMAINING" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 자동매매 실행
        if: steps.calc.outputs.skip == 'false'
        env:
          RUN_MINUTES: ${{ steps.calc.outputs.minutes }}
        run: uv run python scripts/run_paper.py

      - name: 최종 포트폴리오 현황
        if: always()
        run: uv run python scripts/portfolio_report.py
